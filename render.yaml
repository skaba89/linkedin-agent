# LinkedInBoost - Render Blueprint Configuration

services:
  - type: web
    name: linkedin-agent
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: NEXTAUTH_SECRET
        generateValue: true
